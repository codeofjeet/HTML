<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gym Header Example</title>
</head>
<body>
    <div class="main">

        <div class="header">

            <div class="logo-menu">
                <div class="logo">
                    <img src="logo.jpg">
                </div>  <!-- log div closed-->
                <div class="menu">
                    <ul>
                        <li><a href="#">Home</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Training</a></li>
                    </ul>
                </div>  <!-- menu div closed-->
            </div>  <!-- logo-menu div closed-->

            <div class="inner">
                <div class="left">
                    <p id="p1">WORKOUT MADE <br />
                    <span style="color: cadetblue;"> EXCLUSIVE </span> FOR YOU!</p>

                    <p id="p2">We create <b>exclusive and unique workout</b> for you.<br/>
                    Invest in your body and <b>get much more performance</b><br/>
                    and quality of life.</p>
                </div>
                <div class="right"></div>
            </div>  <!-- inner div-->
        </div> <!-- header div closed-->
    </div>
</body>
</html>
