<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global attributes </title>
</head>
<body>
    <h1>Global attributes </h1>
    <p>Global attributes in HTML are attributes that can be applied to any HTML element, providing common functionality and behavior across different tags. They include things like id, class, style, title, and more.</p>
    <h2 title="This is heading two">Heading</h2>
    <p style="color: red; font-size: 25px; text-align: center;">This paragraph is using style attribute</p>
</body>
</html>
