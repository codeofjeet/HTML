<!DOCTYPE html>     <!-- document type and version -->
<html lang="en">    <!-- defines the primary language of the webpage as English -->
<head>      <!-- The head tag contains the "behind the scenes" elements for a webpage -->
    <meta charset="UTF-8">  <!-- the World Wide Web's most common character encoding -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Basics</title>      <!--  Defines the title displayed on the browser tab. -->
</head>
<body>      <!-- The body tag is used to enclose all the visible content of a webpage. -->

    <!-- Paragraph and line break tag(element) br-brakrow -->
    <p>    <!-- opening tag -->
            HTML stands for HyperText Markup Language.    <!-- content of tag(element) -->
    </p>  <!-- closing tag -->

    <!-- html:5 + enter shortcut for boilerplate code -->
<!-- shortcut of comments (Ctrl + K + C) -->

</html>
